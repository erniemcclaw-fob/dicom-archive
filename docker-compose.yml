version: "3.9"

services:

  # ── Ingest agent — accepts DICOM C-STORE from modalities ────────────────────
  # Runs on the hospital LAN. Has NO direct database access and NO cloud
  # storage credentials. All metadata writes go through the server API.
  # File uploads use pre-signed URLs / SAS tokens from the server.
  agent:
    build: ./agent
    restart: unless-stopped
    ports:
      - "11112:11112"      # DICOM port — open to modality network
    volumes:
      - ./data/staging:/data/staging
      - ./data/quarantine:/data/quarantine
    env_file:
      - ./agent/.env
    environment:
      SERVER_URL: http://server:8080
      AGENT_API_KEY: ${AGENT_API_KEY:?Set AGENT_API_KEY in your environment}
      STAGING_PATH: /data/staging
      UPLOAD_WORKERS: 4
    depends_on:
      server:
        condition: service_started

  # ── Server — REST API + Web UI + Routing engine ──────────────────────────────
  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "8080:8080"        # Web UI + API — expose to internal network only
    volumes:
      - ./data/received:/data/received   # local storage backend (if used)
    environment:
      DATABASE_URL: postgresql://dicom:changeme@postgres:5432/dicom_archive
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /data/received
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      AGENT_API_KEY: ${AGENT_API_KEY:?Set AGENT_API_KEY in your environment}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Postgres ──────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dicom_archive
      POSTGRES_USER:     dicom
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No published port — only accessible to the server container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dicom -d dicom_archive"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Watchtower — automatic container updates ────────────────────────────────
  # Uncomment this service when you're ready for automatic updates.
  # Requires images to be published to a container registry (Docker Hub, GHCR, etc.)
  # rather than built locally. See INSTALL.md § Updating for the full workflow.
  #
  # watchtower:
  #   image: containrrr/watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   # Check for new images every hour (3600 seconds).
  #   # Only watches the agent and server — leaves postgres alone.
  #   command: --interval 3600 dicom-archive-agent-1 dicom-archive-server-1
  #   environment:
  #     - WATCHTOWER_CLEANUP=true        # remove old images after update
  #     - WATCHTOWER_INCLUDE_RESTARTING=true

volumes:
  pgdata:
