version: "3.9"

services:

  # ── Ingest agent — accepts DICOM C-STORE from modalities ────────────────────
  agent:
    build: ./agent
    restart: unless-stopped
    ports:
      - "11112:11112"      # DICOM port — open to modality network
    volumes:
      - ./data/received:/data/received
      - ./data/quarantine:/data/quarantine
    env_file:
      - ./agent/.env
    environment:
      DATABASE_URL: postgresql://dicom:changeme@postgres:5432/dicom_archive
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /data/received
      # Notify the server after each store so on_receive rules fire immediately.
      # Remove this line to rely solely on the 30s queue processor.
      ROUTER_URL: http://server:8080
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

  # ── Server — REST API + Web UI + Routing engine ──────────────────────────────
  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "8080:8080"        # Web UI + API — expose to internal network only
    volumes:
      - ./data/received:/data/received   # shared with agent for local storage
    environment:
      DATABASE_URL: postgresql://dicom:changeme@postgres:5432/dicom_archive
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /data/received
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

  # ── Postgres ──────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dicom_archive
      POSTGRES_USER:     dicom
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dicom -d dicom_archive"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
